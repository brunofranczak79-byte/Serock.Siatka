<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka - System Rezerwowy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; }
        .status { padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .open { background: #e6f4ea; color: #1e8e3e; }
        .closed { background: #fce8e6; color: #d93025; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-join { background-color: #1a73e8; color: white; margin-bottom: 10px; }
        .btn-join:disabled { background-color: #ccc; }
        .list-header { border-top: 1px solid #eee; padding-top: 10px; margin-top: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; margin-bottom: 20px; }
        li { background: #f8f9fa; margin: 5px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .reserve-li { background: #fff3e0; border-color: #ffe0b2; }
        .btn-remove { background: #ff4d4d; color: white; width: auto; padding: 5px 10px; font-size: 0.8rem; }
        .label-reserve { font-size: 0.7rem; background: #ff9800; color: white; padding: 2px 5px; border-radius: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka Serock</h2>
    <div id="status-box" class="status">Łączenie z bazą...</div>

    <input type="text" id="nameInput" placeholder="Twoje imię i nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header">SKŁAD GŁÓWNY <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header" style="color: #ef6c00;">LISTA REZERWOWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');
    const MAX_MAIN = 14;
    const MAX_RESERVE = 10;

    playersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        renderLists(data);
    });

    function joinGame() {
        const input = document.getElementById('nameInput');
        const name = input.value.trim();
        if (!name) return alert("Wpisz imię!");

        playersRef.once('value', (snapshot) => {
            const players = snapshot.val() ? Object.values(snapshot.val()) : [];
            if (players.length >= (MAX_MAIN + MAX_RESERVE)) {
                return alert("Brak wolnych miejsc (nawet na rezerwie)!");
            }
            // Zapisujemy z aktualnym czasem, żeby wiedzieć kto był pierwszy na rezerwie
            playersRef.push({ name: name, timestamp: Date.now() });
            input.value = "";
        });
    }

    function removePlayer(key) {
        if(confirm("Usunąć z listy?")) {
            db.ref('players/' + key).remove();
        }
    }

        const reserveListEl = document.getElementById('reserveList');
        const statusBox = document.getElementById('status-box');

        reserveListEl.innerHTML = "";

        if (!data) {
            document.getElementById('main-counter').innerText = "0/14";
            document.getElementById('reserve-counter').innerText = "0/10";
            statusBox.innerText = "Zapisy OTWARTE";
            statusBox.className = "status open";
            return;
        }

        })).sort((a, b) => a.timestamp - b.timestamp);
