<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1592656670411-2918d7db425a?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { 
            /* POPRAWIONA WIDOCZNOŚĆ KWADRATU */
            background: rgba(255, 255, 255, 0.15); /* Zwiększona gęstość tła */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1.2rem;
            border-radius: 22px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 310px; 
            border: 1px solid rgba(255, 255, 255, 0.3); /* Mocniejsza krawędź */
            color: white;
            text-align: center;
        }

        h2 { margin: 0 0 12px 0; font-size: 1.3rem; letter-spacing: 1px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        
        .status { 
            padding: 8px; 
            border-radius: 12px; 
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .open { background: rgba(40, 167, 69, 0.5); }
        .closed { background: rgba(220, 53, 69, 0.5); }

        input { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2); /* Lepiej widoczny input */
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.8); }

        .btn-join { 
            width: 100%; 
            padding: 10px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-join:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); box-shadow: none; }

        .list-header { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px; 
            font-size: 0.7rem; 
            opacity: 0.9;
            font-weight: bold;
            color: #ffeb3b; /* Kolor żółty dla lepszej widoczności nagłówków */
        }

        ul { list-style: none; padding: 0; text-align: left; margin: 5px 0; }
        li { 
            background: rgba(255,255,255,0.12); 
            margin: 4px 0; 
            padding: 7px 10px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between;
            font-size: 0.85rem;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-remove { background: #ff4d4d; border: none; color: white; border-radius: 5px; padding: 3px 8px; cursor: pointer; font-size: 0.7rem; }
        .timer { color: #ffeb3b; display: block; font-size: 1rem; margin-top: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 SEROCK</h2>
    <div id="status-box" class="status">Czekaj...</div>

    <input type="text" id="nameInput" placeholder="Imię i Nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header">SKŁAD <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header" style="color: #ffa726;">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
