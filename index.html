<html lang="pl">
<head>

    <title>Siatkówka Serock</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 30px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .status { padding: 12px; margin-bottom: 15px; border-radius: 10px; font-weight: bold; color: white; min-height: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #28a745; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 16px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        h4 { margin: 25px 0 10px 0; border-bottom: 2px solid #eee; text-align: left; font-size: 13px; color: #666; display: flex; justify-content: space-between; padding-bottom: 5px; }

        li { background: #f9f9f9; margin: 5px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; font-size: 15px; border: 1px solid #eee; }
        .del-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .info { font-size: 11px; color: #888; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka</h2>

    <input type="text" id="nameInput" placeholder="Imię i nazwisko">
    <button id="joinBtn" onclick="join()">Zapisz się</button>
    
    <div class="info">
        Zapisy są zawsze dostępne.<br>
        Lista czyści się w czwartki o 20:20.

</div>

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('players');

    // Automatyczny reset: Czwartek 20:20
    function checkAutoReset() {
        const teraz = new Date();
        if (teraz.getDay() === 4 && teraz.getHours() === 20 && teraz.getMinutes() === 20) {
            const key = "reset_" + teraz.toDateString() + "_2020";
            if (localStorage.getItem('lastResetDone') !== key) {
                db.remove();
                localStorage.removeItem('myVoleyballId');
                localStorage.setItem('lastResetDone', key);
            }
        }
    }
    setInterval(checkAutoReset, 30000);

    function join() {
        const input = document.getElementById('nameInput');
        const nazwa = input.value.trim();
        
        if(localStorage.getItem('myVoleyballId')) {
            alert("Już jesteś na liście!");
            return;
        }
        if(nazwa.length < 3) {
            alert("Wpisz imię i nazwisko.");
            return;
        }

        db.once('value', snap => {
            if(snap.numChildren() >= 24) {
                alert("Lista pełna!");
                return;
            }
            const nowy = db.push();
            nowy.set({ name: nazwa, ts: Date.now() }).then(() => {
                localStorage.setItem('myVoleyballId', nowy.key);
                input.value = "";
            });
        });
    }

    function removeMe(id) {
        if(confirm("Wypisać się?")) {
            db.child(id).remove().then(() => {
                localStorage.removeItem('myVoleyballId');
            });
        }
    }
