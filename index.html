<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock - System Zapisów</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* TŁO SIATKÓWKOWE Z FILTREM */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('https://images.unsplash.com/photo-1592656670411-2918d7db425a?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { 
            /* BARDZIEJ PRZEZROCZYSTY I MNIEJSZY KWADRACIK */
            background: rgba(255, 255, 255, 0.25); /* Mocniejsza przezroczystość */
            backdrop-filter: blur(15px); /* Silniejsze rozmycie tła */
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px; /* Zmniejszona szerokość */
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
        }

        h2 { 
            color: #ffffff; 
            text-align: center; 
            margin: 0 0 15px 0;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .status { 
            padding: 12px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 20px; 
            font-weight: bold; 
            font-size: 1rem; 
            border: 1px solid rgba(255,255,255,0.3);
        }
        .open { background: rgba(40, 167, 69, 0.7); color: white; }
        .waiting { background: rgba(255, 152, 0, 0.7); color: white; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        input::placeholder { color: rgba(255,255,255,0.8); }
        input:focus { border-color: #ffffff; outline: none; background: rgba(255, 255, 255, 0.3); }

        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-join { background-color: #1a73e8; color: white; margin-bottom: 10px; }
        .btn-join:hover { background-color: #1557b0; box-shadow: 0 0 15px rgba(26, 115, 232, 0.5); }
        .btn-join:disabled { background-color: rgba(255, 255, 255, 0.1); color: rgba(255,255,255,0.5); cursor: not-allowed; }

        .list-header { 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 15px; 
            margin-top: 20px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9rem;
            color: white;
        }
        ul { list-style: none; padding: 0; margin-bottom: 15px; }
        li { 
            background: rgba(255, 255, 255, 0.15); 
            margin: 8px 0; 
            padding: 10px 15px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .reserve-li { background: rgba(255, 152, 0, 0.2); }
        
        .btn-remove { 
            background: rgba(255, 77, 77, 0.8); 
            color: white; 
            width: auto; 
            padding: 5px 10px; 
            font-size: 0.75rem; 
            border-radius: 5px; 
        }
        .timer { font-size: 1.2rem; margin-top: 5px; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka</h2>
    <div id="status-box" class="status">Zapisy OTWARTE</div>

    <input type="text" id="nameInput" placeholder="Imię i Nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header">SKŁAD <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    function updateSystem() {
        const now = new Date();
        const day = now.getDay(); 
        const h = now.getHours();
        const m = now.getMinutes();

        if (day === 3 && h === 23 && m === 59 && now.getSeconds() === 0) playersRef.remove();

        const isSunOpen = (day === 0 && h >= 12);
        const isMonTueOpen = (day === 1 || day === 2);
        const isWedOpen = (day === 3 && (h < 19 || (h === 19 && m < 30)));

        const isOpen = isSunOpen || isMonTueOpen || isWedOpen;
        const statusBox = document.getElementById('status-box');
        const joinBtn = document.getElementById('joinBtn');

        if (isOpen) {
            statusBox.innerText = "Zapisy OTWARTE";
            statusBox.className = "status open";
            joinBtn.disabled = false;
        } else {
            statusBox.className = "status waiting";
            let target = new Date();
            target.setDate(now.getDate() + (7 - day) % 7);
            target.setHours(12, 0, 0, 0);
            if (day === 0 && h >= 12) target.setDate(target.getDate() + 7);

            const diff = target - now;
            const dd = Math.floor(diff / 86400000);
            const hh = Math.floor((diff % 86400000) / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);
