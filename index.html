<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1592656670411-2918d7db425a?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { 
            /* TERAZ KWADRAT JEST WYRAŹNIEJSZY */
            background: rgba(0, 0, 0, 0.5); /* Ciemniejsze tło dla kontrastu */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            width: 85%;
            max-width: 310px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-align: center;
        }

        h2 { margin: 0 0 15px 0; font-size: 1.4rem; letter-spacing: 1px; color: #fff; }
        
        .status { 
            padding: 10px; 
            border-radius: 12px; 
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .open { background: rgba(40, 167, 69, 0.6); }
        .closed { background: rgba(220, 53, 69, 0.6); }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.6); }

        .btn-join { 
            width: 100%; 
            padding: 12px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .btn-join:active { transform: scale(0.98); }
        .btn-join:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }

        .list-header { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 15px; 
            font-size: 0.75rem; 
            font-weight: bold;
            color: #ffeb3b;
            text-transform: uppercase;
        }

        ul { list-style: none; padding: 0; text-align: left; margin: 8px 0; }
        li { 
            background: rgba(255,255,255,0.1); 
            margin: 5px 0; 
            padding: 8px 12px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between;
            font-size: 0.9rem;
            align-items: center;
        }
        .btn-remove { background: #ff4d4d; border: none; color: white; border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 0.7rem; }
        .timer { color: #ffeb3b; display: block; font-size: 1.1rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 SEROCK</h2>
    <div id="status-box" class="status">Czekaj...</div>

    <input type="text" id="nameInput" placeholder="Imię i Nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header">SKŁAD <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header" style="color: #ffa726;">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
