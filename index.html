<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            /* TŁO Z TWOJEGO ZDJĘCIA + NIEBIESKI FILTR */
            background-image: linear-gradient(rgba(0, 40, 120, 0.5), rgba(0, 40, 120, 0.5)), url('https://siatkowkaserock.github.io/Serock.Siatka/image_7.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .container { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.3);
        }
        h2 { color: #003399; margin-bottom: 20px; font-size: 1.8rem; }
        .status { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; border: 2px solid; transition: 0.3s; }
        .open { background: #e6f4ea; color: #1e8e3e; border-color: #1e8e3e; }
        .waiting { background: #fff4e5; color: #d84315; border-color: #ff9800; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #1a73e8; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #999; cursor: not-allowed; transform: none; }
        .timer { font-size: 1.6rem; color: #bf360c; margin-top: 8px; font-weight: 800; }
        .list-header { border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; margin-top: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: rgba(255,255,255,0.6); margin: 6px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .btn-remove { background: #ff5252; padding: 6px 12px; font-size: 0.75rem; width: auto; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka Serock</h2>
    <div id="status-box" class="status">Łączenie...</div>
    
    <input type="text" id="nameInput" placeholder="Imię i Nazwisko">
    <button id="joinBtn" onclick="joinGame()">Zapisz się</button>
    
    <div class="list-header" style="color: #1a73e8;">SKŁAD (14) <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>
    
    <div class="list-header" style="color: #e65100;">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    function updateSystem() {
        const now = new Date();
        const day = now.getDay(); // 0: Niedz, 3: Śr
        const h = now.getHours();
        const m = now.getMinutes();

        // 1. Reset o 23:59 w każdą środę
        if (day === 3 && h === 23 && m === 59 && now.getSeconds() === 0) playersRef.remove();

        // 2. Warunek otwarcia: Niedziela 12:00 do Środy 19:30
        const isSunOpen = (day === 0 && h >= 12);
        const isMonTueOpen = (day === 1 || day === 2);
        const isWedOpen = (day === 3 && (h < 19 || (h === 19 && m < 30)));

        const isOpen = isSunOpen || isMonTueOpen || isWedOpen;
        const statusBox = document.getElementById('status-box');
        const joinBtn = document.getElementById('joinBtn');

        if (isOpen) {
            statusBox.innerText = "Zapisy OTWARTE";
            statusBox.className = "status open";
            joinBtn.disabled = false;
        } else {
            statusBox.className = "status waiting";
            // Cel: najbliższa niedziela 12:00
            let target = new Date();
            target.setDate(now.getDate() + (7 - day) % 7);
            target.setHours(12, 0, 0, 0);
            if (day === 0 && h >= 12) target.setDate(target.getDate() + 7);

            const diff = target - now;
            const dd = Math.floor(diff / 86400000);
            const hh = Math.floor((diff % 86400000) / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);
            
            statusBox.innerHTML = `Zapisy ruszą za:<br><div class="timer">${dd}d ${hh}h ${mm}m ${ss}s</div>`;
            joinBtn.disabled = true;
        }
    }

    setInterval(updateSystem, 1000);
    updateSystem();

    playersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const mainL = document.getElementById('mainList');
        const resL = document.getElementById('reserveList');
        mainL.innerHTML = ""; resL.innerHTML = "";
        
        if (!data) {
            document.getElementById('main-counter').innerText = "0/14";
            document.getElementById('reserve-counter').innerText = "0/10";
            return;
        }

        const players = Object.keys(data).map(k => ({id:k, ...data
