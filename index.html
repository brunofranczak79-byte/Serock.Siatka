<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 340px; text-align: center; }
        .status { padding: 10px; margin-bottom: 15px; border-radius: 10px; font-weight: bold; color: white; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .open { background-color: #28a745; }
        .closed { background-color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        h4 { margin: 20px 0 10px 0; border-bottom: 1px solid #eee; text-align: left; display: flex; justify-content: space-between; font-size: 14px; color: #666; }
        ul { list-style: none; padding: 0; text-align: left; margin: 0; }
        li { background: #fdfdfd; margin-bottom: 5px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; border: 1px solid #eee; font-size: 15px; }
        .del-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .admin-badge { background: #ffc107; color: black; font-size: 12px; padding: 5px; border-radius: 5px; margin-bottom: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka</h2>
    <div id="adminMode" class="admin-badge">🔓 TRYB ADMINISTRATORA (Możesz zapisywać i usuwać wszystkich)</div>
    <div id="statusBox" class="status">Ładowanie...</div>
    
    <input type="text" id="nameInput" placeholder="Twoje Imię i Nazwisko" oninput="refreshListOnly()">
    <button id="joinBtn" onclick="join()">Zapisz się</button>
    
    <h4>SKŁAD <span id="count1">0/14</span></h4>
    <ul id="list1"></ul>
    
    <h4>REZERWA <span id="count2">0/10</span></h4>
    <ul id="list2"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcPfjR646-SpN0xPuBCXQKkT7NLkxs_9c",
        authDomain: "siatka-58398.firebaseapp.com",
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com",
        projectId: "siatka-58398",
        storageBucket: "siatka-58398.firebasestorage.app",
        messagingSenderId: "800028424106",
        appId: "1:800028424106:web:e9ef944a3b8308505d5dd3"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('players');

    function checkStatus() {
        const now = new Date();
        const day = now.getDay(); 
        const hour = now.getHours();
        const min = now.getMinutes();
        const isAdmin = localStorage.getItem('is_admin') === 'true';
        const mySavedId = localStorage.getItem('voley_id');

        const isSundayOpen = (day === 0 && hour >= 10);
        const isWeekOpen = (day >= 1 && day <= 3);
        const isThursdayOpen = (day === 4 && (hour < 19 || (hour === 19 && min < 30)));
        const isOpen = isSundayOpen || isWeekOpen || isThursdayOpen;

        const statusBox = document.getElementById('statusBox');
        const joinBtn = document.getElementById('joinBtn');

        if (isAdmin) {
            document.getElementById('adminMode').style.display = "block";
        }

        if (isOpen || isAdmin) {
            statusBox.innerText = "ZAPISY OTWARTE";
            statusBox.className = "status open";
            // Admin może się zapisać zawsze, zwykły tylko raz
            if (mySavedId && !isAdmin) {
                joinBtn.disabled = true;
                joinBtn.innerText = "Już jesteś zapisany";
            } else {
                joinBtn.disabled = false;
                joinBtn.innerText = "Zapisz się";
            }
        } else {
            statusBox.innerText = "ZAPISY ZAMKNIĘTE";
            statusBox.className = "status closed";
            joinBtn.disabled = true;
        }

        // RESET: Czwartek 22:00
        if (day === 4 && hour === 22 && min === 0) {
            db.remove();
            localStorage.removeItem('voley_id');
            localStorage.removeItem('voley_name');
        }
    }

    setInterval(checkStatus, 5000);
    checkStatus();

    function join() {
        const input = document.getElementById('nameInput');
        const name = input.value.trim();
        const isAdmin = localStorage.getItem('is_admin') === 'true';

        if (name === "admin123") { localStorage.setItem('is_admin', 'true'); location.reload(); return; }
        if (name === "admin1234") { localStorage.clear(); location.reload(); return; }
        
        if (name.length < 3) return alert("Wpisz pełne imię!");

        db.once('value').then(snap => {
            const players = snap.val() ? Object.values(snap.val()) : [];
            
            // Blokada powtarzających się imion (chyba że admin chce kogoś dopisać)
            if (players.some(p => p.name.toLowerCase() === name.toLowerCase()) && !isAdmin) {
                alert("To imię jest już na liście!");
                return;
            }

            const newRef = db.push();
            newRef.set({ name: name, ts: Date.now() }).then(() => {
                // Tylko zwykły użytkownik dostaje blokadę urządzenia
                if (!isAdmin) {
                    localStorage.setItem('voley_id', newRef.key);
                    localStorage.setItem('voley_name', name);
                }
                input.value = "";
                checkStatus();
            });
        });
    }

    function removePlayer(id) {
        if (confirm("Usunąć zapis?")) {
            db.child(id).remove().then(() => {
                if (localStorage.getItem('voley_id') === id) {
                    localStorage.removeItem('voley_id');
                    localStorage.removeItem('voley_name');
                }
                checkStatus();
            });
        }
    }

    function refreshListOnly() {
        db.once('value', snap => renderList(snap.val()));
    }

    function renderList(data) {
        const l1 = document.getElementById('list1');
        const l2 = document.getElementById('list2');
        const myId = localStorage.getItem('voley_id');
        const isAdmin = localStorage.getItem('is_admin') === 'true';
        const currentInput = document.getElementById('nameInput').value.trim().toLowerCase();

        l1.innerHTML = ""; l2.innerHTML = "";
        const players = data ? Object.keys(data).map(id => ({id, ...data[id]})).sort((a,b) => a.ts - b.ts) : [];

        players.forEach((p, i) => {
            const li = document.createElement('li');
            // Usuwanie: Admin może wszystko, Ty możesz swoje ID lub to co wpiszesz
            const canDelete = isAdmin || p.id === myId || (currentInput.length > 2 && p.name.toLowerCase() === currentInput);
            const btn = canDelete ? `<button class="del-btn" onclick="removePlayer('${p.id}')">Usuń</button>` : "";
            
            li.innerHTML = `<span><b>${i+1}.</b> ${p.name}</span> ${btn}`;
            if (i < 14) l1.appendChild(li); else l2.appendChild(li);
        });
        
        document.getElementById('count1').innerText = Math.min(players.length, 14) + "/14";
        document.getElementById('count2').innerText = Math.max(0, players.length - 14) + "/10";
    }

    db.on('value', snap => renderList(snap.val()));
</script>
</body>
</html>
