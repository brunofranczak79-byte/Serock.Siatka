<script>
    // Konfiguracja (pozostaje Twoja)
    const firebaseConfig = {
        apiKey: "AIzaSyBcPfjR646-SpN0xPuBCXQKkT7NLkxs_9c",
        authDomain: "siatka-58398.firebaseapp.com",
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com",
        projectId: "siatka-58398",
        storageBucket: "siatka-58398.firebasestorage.app",
        messagingSenderId: "800028424106",
        appId: "1:800028424106:web:e9ef944a3b8308505d5dd3"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database().ref('players');

    // ... (funkcja updateTimer bez zmian) ...

    function join() {
        const nameInput = document.getElementById('nameInput');
        const name = nameInput.value.trim();
        
        if (name.length < 3) return alert("Wpisz imię i nazwisko!");
        if (localStorage.getItem('voley_id')) return alert("Już jesteś na liście!");

        const newPlayerRef = db.push();
        const playerId = newPlayerRef.key;

        newPlayerRef.set({ 
            name: name, 
            ts: Date.now() 
        })
        .then(() => {
            localStorage.setItem('voley_id', playerId);
            nameInput.value = "";
            alert("Zapisano pomyślnie!");
        })
        .catch((error) => {
            console.error(error);
            alert("Błąd zapisu: " + error.message + "\nSprawdź reguły bazy danych!");
        });
    }

    // Funkcja usuwania (którą prosiłeś wcześniej)
    function removeMe(id) {
        if (confirm("Czy na pewno chcesz się wypisać?")) {
            db.child(id).remove()
                .then(() => {
                    localStorage.removeItem('voley_id');
                })
                .catch(err => alert("Błąd przy wypisywaniu: " + err.message));
        }
    }

    // Odświeżanie listy (poprawione)
    db.on('value', snap => {
        const data = snap.val();
        const l1 = document.getElementById('list1');
        const l2 = document.getElementById('list2');
        const myId = localStorage.getItem('voley_id');
        
        l1.innerHTML = ""; l2.innerHTML = "";
        
        const players = data ? Object.keys(data).map(id => ({
            id: id,
            ...data[id]
        })).sort((a,b) => a.ts - b.ts) : [];

        players.forEach((p, i) => {
            const li = document.createElement('li');
            let content = `<span><b>${i+1}.</b> ${p.name}</span>`;
            if (p.id === myId) {
                content += `<button class="del-btn" onclick="removeMe('${p.id}')">❌</button>`;
            }
            li.innerHTML = content;
            if (i < 14) l1.appendChild(li); else l2.appendChild(li);
        });

        document.getElementById('count1').innerText = Math.min(players.length, 14) + "/14";
        document.getElementById('count2').innerText = Math.max(0, players.length - 14) + "/10";
    });
</script>
