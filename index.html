<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 340px; text-align: center; }
        .status { padding: 10px; margin-bottom: 15px; border-radius: 10px; font-weight: bold; color: white; background-color: #28a745; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; }
        h4 { margin: 20px 0 10px 0; border-bottom: 1px solid #eee; text-align: left; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #fdfdfd; margin-bottom: 5px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; border: 1px solid #eee; }
        .del-btn { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .admin-badge { background: #ffc107; color: black; font-size: 12px; padding: 5px; border-radius: 5px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka</h2>
    <div id="adminMode" class="admin-badge">🔓 TRYB ADMINISTRATORA</div>
    <div id="statusBox" class="status">ZAPISY OTWARTE</div>
    
    <input type="text" id="nameInput" placeholder="Twoje Imię i Nazwisko">
    <button id="joinBtn" onclick="join()">Zapisz się</button>
    
    <h4>SKŁAD <span id="count1">0/14</span></h4>
    <ul id="list1"></ul>
    
    <h4>REZERWA <span id="count2">0/10</span></h4>
    <ul id="list2"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcPfjR646-SpN0xPuBCXQKkT7NLkxs_9c",
        authDomain: "siatka-58398.firebaseapp.com",
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com",
        projectId: "siatka-58398",
        storageBucket: "siatka-58398.firebasestorage.app",
        messagingSenderId: "800028424106",
        appId: "1:800028424106:web:e9ef944a3b8308505d5dd3"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('players');

    function join() {
        const input = document.getElementById('nameInput');
        const name = input.value.trim();

        // Obsługa haseł
        if (name === "admin123") { localStorage.setItem('is_admin', 'true'); location.reload(); return; }
        if (name === "admin1234") { localStorage.clear(); location.reload(); return; }
        if (name.length < 3) return alert("Wpisz pełne imię!");

        // SPRAWDZANIE CZY IMIĘ JUŻ JEST W BAZIE
        db.once('value').then(snap => {
            const data = snap.val();
            const players = data ? Object.values(data) : [];
            
            // Jeśli nie jesteś adminem, sprawdź czy imię się powtarza
            const exists = players.some(p => p.name.toLowerCase() === name.toLowerCase());
            
            if (exists && localStorage.getItem('is_admin') !== 'true') {
                alert("Osoba o tym imieniu jest już na liście!");
                return;
            }

            // Jeśli nie istnieje, zapisz
            db.push().set({ name: name, ts: Date.now() }).then(() => {
                localStorage.setItem('voley_name', name);
                input.value = "";
            });
        });
    }

    function removePlayer(id) {
        if (confirm("Usunąć ten wpis?")) db.child(id).remove();
    }

    db.on('value', snap => {
        const data = snap.val();
        const l1 = document.getElementById('list1');
        const l2 = document.getElementById('list2');
        const currentInputValue = document.getElementById('nameInput').value.trim();
        const mySavedName = localStorage.getItem('voley_name');
        const isAdmin = localStorage.getItem('is_admin') === 'true';
        
        if(isAdmin) document.getElementById('adminMode').style.display = "block";

        l1.innerHTML = ""; l2.innerHTML = "";
        const players = data ? Object.keys(data).map(id => ({id, ...data[id]})).sort((a,b) => a.ts - b.ts) : [];

        players.forEach((p, i) => {
            const li = document.createElement('li');
            
            // PRZYCISK USUŃ: Pokaże się gdy:
            // 1. Jesteś adminem
            // 2. To Twoje zapamiętane imię
            // 3. Wpisałeś właśnie to imię w pole tekstowe (ratunek gdy czyścisz ciasteczka)
            let btn = "";
            if (isAdmin || p.name === mySavedName || p.name === currentInputValue) {
                btn = `<button class="del-btn" onclick="removePlayer('${p.id}')">Usuń</button>`;
            }
            
            li.innerHTML = `<span><b>${i+1}.</b> ${p.name}</span> ${btn}`;
            if (i < 14) l1.appendChild(li); else l2.appendChild(li);
        });
        
        document.getElementById('count1').innerText = Math.min(players.length, 14) + "/14";
        document.getElementById('count2').innerText = Math.max(0, players.length - 14) + "/10";
    });
</script>
</body>
</html>
