<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* TŁO SIATKÓWKOWE */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1592656670411-2918d7db425a?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { 
            /* MNIEJSZY, PRZEZROCZYSTY KWADRACIK (GLASSMORPHISM) */
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.37);
            width: 90%;
            max-width: 350px; /* Zmniejszona szerokość */
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: white;
            text-align: center;
        }

        h2 { margin: 0 0 15px 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .status { 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .open { background: rgba(40, 167, 69, 0.5); border: 1px solid #28a745; }
        .closed { background: rgba(220, 53, 69, 0.5); border: 1px solid #dc3545; }

        input { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-join { 
            width: 100%; 
            padding: 10px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }
        .btn-join:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }

        .list-header { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 20px; 
            font-size: 0.75rem; 
            opacity: 0.7;
            text-transform: uppercase;
        }

        ul { list-style: none; padding: 0; text-align: left; margin: 5px 0; }
        li { 
            background: rgba(255,255,255,0.05); 
            margin: 4px 0; 
            padding: 6px 10px; 
            border-radius: 6px; 
            display: flex; 
            justify-content: space-between;
            font-size: 0.85rem;
            align-items: center;
        }
        .btn-remove { background: #ff4d4d; border: none; color: white; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 0.7rem; }
        .timer { color: #ffc107; display: block; font-size: 1.1rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 SEROCK</h2>
    <div id="status-box" class="status">Sprawdzanie...</div>

    <input type="text" id="nameInput" placeholder="Imię i Nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header">SKŁAD <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    function updateSystem() {
        const now = new Date();
        const day = now.getDay(); 
        const h = now.getHours();
        const m = now.getMinutes();

        // 1. Reset listy: Środa 23:59
        if (day === 3 && h === 23 && m === 59 && now.getSeconds() === 0) {
            playersRef.remove();
        }

        // 2. Logika otwarcia (Niedz 12:00 - Środa 19:30)
        const isSunOpen = (day === 0 && h >= 12);
        const isMonTueOpen = (day === 1 || day === 2);
        const isWedOpen = (day === 3 && (h < 19 || (h === 19 && m < 30)));
        const isOpen = isSunOpen || isMonTueOpen || isWedOpen;

        const statusBox = document.getElementById('status-box');
        const joinBtn = document.getElementById('joinBtn');

        if (isOpen) {
            statusBox.className = "status open";
            statusBox.innerHTML = "ZAPISY OTWARTE";
            joinBtn.disabled = false;
        } else {
            statusBox.className = "status closed";
            joinBtn.disabled = true;

            // Obliczanie czasu do niedzieli 12:00
            let target = new Date();
            target.setDate(now.getDate() + (7 - day) % 7);
            if (day === 0 && h >= 12) target.setDate(target.getDate() + 7);
            target.setHours(12, 0, 0, 0);

            const diff = target - now;
            const d = Math.floor(diff / 86400000);
            const hh = Math.floor((diff % 86400000) / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);

            statusBox.innerHTML = `MECZ TRWA / ZAMKNIĘTE<br><span class="timer">${d}d ${hh}h ${mm}m ${ss}s</span>`;
        }
    }

    setInterval(updateSystem, 1000);
    updateSystem();

    function joinGame() {
        const name = document.getElementById('nameInput').value.trim();
        if (name) {
            playersRef.push({ name: name, time: Date.now() });
            document.getElementById('nameInput').value = "";
        }
    }

    playersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const mainL = document.getElementById('mainList');
        const resL = document.getElementById('reserveList');
        mainL.innerHTML = ""; resL.innerHTML = "";
        
        if (!data) {
            document.getElementById('main-counter').innerText = "0/14";
            document.getElementById('reserve-counter').innerText = "0/10";
            return;
        }

        const players = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b) => a.time - b.time);
        players.forEach((p, i) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${i + 1}. ${p.name}</span> <button class="btn-remove" onclick="removePlayer('${p.id}')">X</button>`;
            if (i < 14) mainL.appendChild(li);
            else if (i < 24) resL.appendChild(li);
        });
        document.getElementById('main-counter').innerText = `${Math.min(players.length, 14)}/14`;
        document.getElementById('reserve-counter').innerText = `${Math.max(0, players.length - 14)}/10`;
    });

    function removePlayer(id) {
        if(confirm("Usunąć?")) db.ref('players/' + id).remove();
    }
</script>
</body>
</html>
