<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock - System Tygodniowy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; }
        .status { padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; }
        .open { background: #e6f4ea; color: #1e8e3e; border: 1px solid #1e8e3e; }
        .closed { background: #fce8e6; color: #d93025; border: 1px solid #d93025; }
        .waiting { background: #fff4e5; color: #664d03; border: 1px solid #ff9800; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-join { background-color: #1a73e8; color: white; margin-bottom: 10px; }
        .btn-join:disabled { background-color: #ccc; cursor: not-allowed; }
        .list-header { border-top: 2px solid #eee; padding-top: 15px; margin-top: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; margin-bottom: 20px; }
        li { background: #f8f9fa; margin: 8px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .reserve-li { background: #fff3e0; border-color: #ffe0b2; }
        .btn-remove { background: #ff4d4d; color: white; width: auto; padding: 6px 12px; font-size: 0.8rem; border-radius: 5px; }
        .timer { font-size: 0.9rem; margin-top: 5px; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka Serock</h2>
    <div id="status-box" class="status">Łączenie...</div>

    <input type="text" id="nameInput" placeholder="Twoje imię i nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header" style="color: #1a73e8;">SKŁAD GŁÓWNY <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header" style="color: #ef6c00;">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcPfjR646-SpN0xPuBCXQKkT7NLkxs_9c",
        authDomain: "siatka-58398.firebaseapp.com",
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com",
        projectId: "siatka-58398",
        storageBucket: "siatka-58398.firebasestorage.app",
        messagingSenderId: "800028424106",
        appId: "1:800028424106:web:e9ef944a3b8308505d5dd3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    function updateSystem() {
        const now = new Date();
        const day = now.getDay(); 
        const hour = now.getHours();
        const min = now.getMinutes();

        // 1. Automatyczne zerowanie w środę o 23:59
        if (day === 3 && hour === 23 && min === 59) {
            playersRef.remove();
        }

        // 2. Określanie okna zapisów: Niedziela 18:00 - Środa 19:30
        const afterSun = (day === 0 && hour >= 18);
        const monOrTue = (day === 1 || day === 2);
        const beforeWed = (day === 3 && (hour < 19 || (hour === 19 && min < 30)));

        const isOpen = afterSun || monOrTue || beforeWed;
        const statusBox = document.getElementById('status-box');
        const joinBtn = document.getElementById('joinBtn');

        if (isOpen) {
            statusBox.innerText = "Zapisy OTWARTE";
            statusBox.className = "status open";
            joinBtn.disabled = false;
        } else if (day === 3 && hour >= 19) {
            statusBox.innerText = "Zapisy ZAKOŃCZONE (Mecz trwa)";
            statusBox.className = "status closed";
            joinBtn.disabled = true;
        } else {
            // Timer do niedzieli 18:00
            statusBox.className = "status waiting";
            calculateCountdown(statusBox);
            joinBtn.disabled = true;
        }
    }

    function calculateCountdown(el) {
        const now = new Date();
        const target = new Date();
        target.setDate(now.getDate() + (7 - now.getDay()) % 7);
        target.setHours(18, 0, 0, 0);
        if (now >= target) target.setDate(target.getDate() + 7);

        const diff = target - now;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        
        el.innerHTML = `Zapisy ruszą za:<br><div class="timer">${d}d ${h}h ${m}m</div>`;
    }

    setInterval(updateSystem, 1000);
    updateSystem();

    playersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const mainList = document.getElementById('mainList');
        const resList = document.getElementById('reserveList');
        mainList.innerHTML = ""; resList.innerHTML = "";

        if (!data) {
            document.getElementById('main-counter').innerText = "0/14";
            document.getElementById('reserve-counter').innerText = "0/10";
            return;
        }

        const players = Object.keys(data).map(k => ({id:k, ...data
