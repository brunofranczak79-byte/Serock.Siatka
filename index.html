<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapisy na Siatkówkę</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .status { padding: 10px; margin-bottom: 15px; border-radius: 5px; font-weight: bold; color: white; }
        .open { background-color: #28a745; }
        .closed { background-color: #dc3545; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #eee; margin: 5px 0; padding: 8px; display: flex; justify-content: space-between; border-radius: 3px; }
        .remove-btn { background: red; color: white; border: none; padding: 2px 5px; cursor: pointer; font-size: 10px; }
        .timer { font-size: 12px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka Serock</h2>
    <div id="statusBox" class="status">Sprawdzanie...</div>
    
    <input type="text" id="nameInput" placeholder="Twoje imię i nazwisko">
    <button id="joinBtn" onclick="join()">Zapisz się</button>

    <h4 style="margin-top:20px; border-bottom: 1px solid #ccc;">LISTA (Max 14) <span id="count1">0/14</span></h4>
    <ul id="list1"></ul>

    <h4 style="margin-top:20px; border-bottom: 1px solid #ccc;">REZERWA <span id="count2">0/10</span></h4>
    <ul id="list2"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Konfiguracja
    const config = { databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database().ref('players');

    // System czasu i statusu
    function update() {
        const teraz = new Date();
        const dzien = teraz.getDay(); // 0-niedz, 3-środa
        const h = teraz.getHours();
        const m = teraz.getMinutes();

        // Reset w środę o 23:59
        if(dzien === 3 && h === 23 && m === 59 && teraz.getSeconds() === 0) db.remove();

        // Czy otwarte (Niedz 12:00 do Środa 19:30)
        const otwarteNiedz = (dzien === 0 && h >= 12);
        const otwartePonWt = (dzien === 1 || dzien === 2);
        const otwarteSroda = (dzien === 3 && (h < 19 || (h === 19 && m < 30)));
        
        const isOpen = otwarteNiedz || otwartePonWt || otwarteSroda;
        const box = document.getElementById('statusBox');
        const btn = document.getElementById('joinBtn');

        if(isOpen) {
            box.className = "status open";
            box.innerHTML = "ZAPISY OTWARTE";
            btn.disabled = false;
        } else {
            box.className = "status closed";
            btn.disabled = true;

            // Odliczanie do niedzieli 12:00
            let cel = new Date();
            cel.setDate(teraz.getDate() + (7 - dzien) % 7);
            if(dzien === 0 && h >= 12) cel.setDate(cel.getDate() + 7);
            cel.setHours(12, 0, 0, 0);

            const roznica = cel - teraz;
            const d = Math.floor(roznica / 86400000);
            const hh = Math.floor((roznica % 86400000) / 3600000);
            const mm = Math.floor((roznica % 3600000) / 60000);
            box.innerHTML = `ZAPISY RUSZAJĄ ZA:<br><span class="timer">${d}dni ${hh}h ${mm}min</span>`;
        }
    }

    setInterval(update, 1000);
    update();

    // Funkcja zapisu
    function join() {
        const n = document.getElementById('nameInput').value;
        if(n.trim() !== "") {
            db.push({ name: n, ts: Date.now() });
            document.getElementById('nameInput').value = "";
        }
    }

    // Pobieranie danych
    db.on('value', snap => {
        const data = snap.val();
        const l1 = document.getElementById('list1');
        const l2 = document.getElementById('list2');
        l1.innerHTML = ""; l2.innerHTML = "";
        
        if(!data) {
            document.getElementById('count1').innerText = "0/14";
            document.getElementById('count2').innerText = "0/10";
            return;
        }

        const players = Object.keys(data).map(id => ({id, ...data[id]})).sort((a,b) => a.ts - b.ts);
        
        players.forEach((p, i) => {
            const li = document.createElement('li');
            li.innerHTML = `${i+1}. ${p.name} <button class="remove-btn" onclick="removeP('${p.id}')">X</button>`;
            if(i < 14) l1.appendChild(li);
            else l2.appendChild(li);
        });

        document.getElementById('count1').innerText = Math.min(players.length, 14) + "/14";
        document.getElementById('count2').innerText = Math.max(0, players.length - 14) + "/10";
    });

    function removeP(id) {
        if(confirm("Usunąć?")) firebase.database().ref('players/' + id).remove();
    }
</script>

</body>
</html>
