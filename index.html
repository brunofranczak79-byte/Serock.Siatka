<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock - System Tygodniowy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 5px; }
        .status { padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; }
        .open { background: #e6f4ea; color: #1e8e3e; border: 1px solid #1e8e3e; }
        .closed { background: #fce8e6; color: #d93025; border: 1px solid #d93025; }
        .waiting { background: #fff4e5; color: #664d03; border: 1px solid #ff9800; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-join { background-color: #1a73e8; color: white; margin-bottom: 10px; }
        .btn-join:disabled { background-color: #ccc; cursor: not-allowed; }
        .list-header { border-top: 2px solid #eee; padding-top: 15px; margin-top: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; margin-bottom: 20px; }
        li { background: #f8f9fa; margin: 8px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .reserve-li { background: #fff3e0; border-color: #ffe0b2; }
        .btn-remove { background: #ff4d4d; color: white; width: auto; padding: 6px 12px; font-size: 0.8rem; border-radius: 5px; }
        .timer { font-size: 0.9rem; margin-top: 5px; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏐 Siatkówka Serock</h2>
    <div id="status-box" class="status">Łączenie...</div>

    <input type="text" id="nameInput" placeholder="Twoje imię i nazwisko">
    <button id="joinBtn" class="btn-join" onclick="joinGame()">Zapisz się</button>

    <div class="list-header" style="color: #1a73e8;">SKŁAD GŁÓWNY <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>

    <div class="list-header" style="color: #ef6c00;">REZERWA <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcPfjR646-SpN0xPuBCXQKkT7NLkxs_9c",
        authDomain: "siatka-58398.firebaseapp.com",
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com",
        projectId: "siatka-58398",
        storageBucket: "siatka-58398.firebasestorage.app",
        messagingSenderId: "800028424106",
        appId: "1:800028424106:web:e9ef944a3b8308505d5dd3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');
    let currentPlayers = [];

    // Funkcja zarządzająca czasem i statusem
    function updateSystem() {
        const now = new Date();
        const day = now.getDay(); // 0: Niedz, 1: Pon, 2: Wt, 3: Śr, 4: Czw, 5: Pt, 6: Sob
        const hour = now.getHours();
        const min = now.getMinutes();

        let status = ""; 
        let canRegister = false;

        // 1. Automatyczne zerowanie w środę o 23:59
        if (day === 3 && hour === 23 && min === 59) {
            playersRef.remove();
        }

        // 2. Określanie czy zapisy są otwarte (Niedziela 18:00 - Środa 19:30)
        const afterSundayStart = (day === 0 && hour >= 18) || (day > 0 && day < 3);
        const beforeWednesdayEnd = (day === 3 && (hour < 19 || (hour === 19 && min < 30)));

        if (afterSundayStart || beforeWednesdayEnd) {
            status = "Zapisy OTWARTE";
            canRegister = true;
        } else if (day === 3 && (hour >= 19)) {
            status = "Zapisy ZAKOŃCZONE";
        } else {
            // Obliczanie czasu do niedzieli 18:00
            status = "Zapisy zamknięte";
            calculateCountdown();
            return;
        }

        const statusBox = document.getElementById('status-box');
        statusBox.innerText = status;
        statusBox.className = "status " + (canRegister ? "open" : "closed");
        document.getElementById('joinBtn').disabled = !canRegister;
    }

    function calculateCountdown() {
        const now = new Date();
        const nextSunday = new Date();
        nextSunday.setDate(now.getDate() + (7 - now.getDay()) % 7);
        nextSunday.setHours(18, 0, 0, 0);
        if (now > nextSunday) nextSunday.setDate(nextSunday.getDate() + 7);

        const diff = nextSunday - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const mins = Math.floor((diff / (1000 * 60)) % 60);

        const statusBox = document.getElementById('status-box');
        statusBox.className = "status waiting";
        statusBox.innerHTML = `Zapisy ruszą za:<br><div class="timer">${days}d ${hours}h ${mins}m</div>`;
        document.getElementById('joinBtn').disabled = true;
    }

    // Odświeżaj zegar co minutę
    setInterval(updateSystem, 60000);
    updateSystem();

    // Reszta logiki (Firebase)
    playersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const mainListEl = document.getElementById('mainList');
        const reserveListEl = document.getElementById('reserveList');
        mainListEl.innerHTML = ""; reserveListEl.innerHTML = "";
        
        if (!data) {
            document.getElementById('main-counter').innerText = "0/14";
            document.getElementById('reserve-counter').innerText = "0/10";
            return;
        }

        const playersArray = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                                   .sort((a, b) => a.timestamp - b.timestamp);

        playersArray.forEach((player, index) => {
            const li = document.createElement('li');
            if (index < 14) {
                li.innerHTML = `<span><b>${index+1}.</b> ${player.name}</span> <button class="btn-remove" onclick="removePlayer('${player.id}')">Usuń</button>`;
                mainListEl.appendChild(li);
            } else if (index < 24) {
                li.className = "reserve-li";
                li.innerHTML = `<span><b>${index-13}.</b> ${player.name}</span> <button class="btn-remove" onclick="removePlayer('${player.id}')">Usuń</button>`;
                reserveListEl.appendChild(li);
            }
        });
        document.getElementById('main-counter').innerText = `${Math.min(playersArray.length, 14)}/14`;
        document.getElementById('reserve-counter').innerText = `${Math.max(0, Math.min(playersArray.length - 14, 10))}/10`;
    });

    function joinGame() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("Wpisz imię!");
        playersRef.push({ name: name, timestamp: Date.now() });
        document.getElementById('nameInput').value = "";
    }

    function removePlayer(key) {
        if(confirm("Usunąć?")) db.ref('players/' + key).remove();
    }
</script>
</body>
</html>
