<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siatkówka Serock</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-color: #a3b1d6;
        }
        .container { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%; max-width: 400px; text-align: center;
        }
        .status { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; border: 2px solid #000; }
        .open { background: #f0f0f0; color: #000; }
        .waiting { background: #fff4e5; color: #d84315; border-color: #ff9800; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #1a73e8; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #1a73e8; color: white; font-weight: bold; cursor: pointer; }
        .timer { font-size: 1.5rem; color: #bf360c; font-weight: bold; }
        .list-header { display: flex; justify-content: space-between; font-weight: bold; margin-top: 20px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #fff; margin: 5px 0; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #003399;">🏐 Siatkówka Serock</h2>
    <div id="status-box" class="status">Łączenie z bazą...</div>
    
    <input type="text" id="nameInput" placeholder="Twoje imię i nazwisko">
    <button id="joinBtn" onclick="joinGame()">Zapisz się</button>
    
    <div class="list-header" style="color: #1a73e8;">SKŁAD (MAX 14) <span id="main-counter">0/14</span></div>
    <ul id="mainList"></ul>
    
    <div class="list-header" style="color: #e65100;">REZERWA (MAX 10) <span id="reserve-counter">0/10</span></div>
    <ul id="reserveList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // Uproszczona konfiguracja
    const firebaseConfig = {
        databaseURL: "https://siatka-58398-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');

    function updateSystem() {
        const now = new Date();
        const day = now.getDay(); 
        const h = now.getHours();
        const m = now.getMinutes();

        // Okno: Niedziela 12:00 do Środy 19:30
        const isSunOpen = (day === 0 && h >= 12);
        const isMonTueOpen = (day === 1 || day === 2);
        const isWedOpen = (day === 3 && (h < 19 || (h === 19 && m < 30)));

        const isOpen = isSunOpen || isMonTueOpen || isWedOpen;
        const statusBox = document.getElementById('status-box');
        const joinBtn = document.getElementById('joinBtn');

        if (isOpen) {
            statusBox.innerText = "Zapisy OTWARTE";
            statusBox.className = "status open";
            joinBtn.disabled = false;
        } else {
            statusBox.className = "status waiting";
            let target = new Date();
            target.setDate(now.getDate() + (7 - day) % 7);
            target.setHours(12, 0, 0, 0);
            if (day === 0 && h >= 12) target.setDate(target.getDate() + 7);

            const diff = target - now;
            const dd = Math.floor(diff / 86400000);
            const hh = Math.floor((diff % 86400000) / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);
            
            statusBox.innerHTML = `Zapisy ruszą za:<br><div class="timer">${dd}d ${hh}h ${mm}m ${ss}s</div>`;
            joinBtn.disabled = true;
        }
    }

    setInterval(updateSystem, 1000);
    updateSystem();

    // Słuchanie bazy danych
    playersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const mainL = document.getElementById('mainList');
        const resL = document.getElementById('reserveList');
        mainL.innerHTML = ""; resL.innerHTML = "";
        
        if (!data) {
            document.getElementById('main-counter').innerText = "0/14";
            document.getElementById('reserve-counter').innerText = "0/10";
            return;
        }

        const players = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b) => a.time - b.time);
        players.forEach((p, i) => {
            const li = document.createElement('li');
            li.innerHTML = `<span><b>${i < 14 ? i+1 : i-13}.</b> ${p.name}</span> <button style="background:red; color:white; border:none; border-radius:4px; padding:2px 8px; cursor:pointer;" onclick="removePlayer('${p.id}')">X</button>`;
            if (i < 14) mainL.appendChild(li);
            else if (i < 24) resL.appendChild(li);
        });
        document.getElementById('main-counter').innerText = `${Math.min(players.length, 14)}/14`;
        document.getElementById('reserve-counter').innerText = `${Math.max(0, Math.min(players.length-14, 10))}/10`;
    });

    function joinGame() {
        const name = document.getElementById('nameInput').value.trim();
        if (name) {
            playersRef.push({name: name, time: Date.now()})
                .then(() => { document.getElementById('nameInput').value = ""; })
                .catch((err) => { alert("Błąd bazy danych! Sprawdź czy kliknąłeś 'Publish' w Firebase."); });
        }
    }

    function removePlayer(id) { if(confirm("Usunąć?")) db.ref('players/'+id).remove(); }
</script>
</body>
</html>
